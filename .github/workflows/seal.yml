on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  seal-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Seal fix
        uses: seal-community/cli-action@latest
        with:
          token: ${{ secrets.SEAL_TOKEN }}
          mode: fix
          fix_mode: local
          project: seal-test-npm-23-07
          target: .
